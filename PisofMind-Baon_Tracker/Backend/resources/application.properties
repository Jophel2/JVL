# Spring Application Configuration for PisofMind

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Local profile default
spring.profiles.active=h2

# Database Configuration - PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pisofmind}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true


# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT Configuration
jwt.secret=PisofMindSecretKeyForJWTTokenGenerationAndValidation2024IsNowSuperSecure123456789ABCDEF
jwt.expiration=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.org.PisofMind=DEBUG
logging.level.org.springframework.security=DEBUG

# Application Name
spring.application.name=PisofMind

# Enable HTTP/2
server.http2.enabled=true
